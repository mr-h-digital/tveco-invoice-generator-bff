spring.application.name=tveco-invoice-generator-bff

# ── Database ─────────────────────────────────────────────────────────────────
# Railway injects individual PG* vars alongside DATABASE_URL.
# We build a proper JDBC URL from them so HikariCP and Flyway are happy.
# Local fallback uses the plain jdbc: form.
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:tveco}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Jackson ──────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── CORS ─────────────────────────────────────────────────────────────────────
# Override with your deployed front-end URL in Railway env vars
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

# ── Notifications ────────────────────────────────────────────────────────────
app.notification.webhook-url=${NOTIFICATION_WEBHOOK_URL:}
app.notification.webhook-secret=${NOTIFICATION_WEBHOOK_SECRET:}

# ── Local Admin Auth (BFF Login) ─────────────────────────────────────────────
app.auth.admin-email=${ADMIN_EMAIL:admin@tveco.co.za}
app.auth.admin-password=${ADMIN_PASSWORD:tveco2026}
app.auth.jwt-secret=${JWT_SECRET:change-this-jwt-secret-to-at-least-32-bytes-long}
app.auth.jwt-expiration-seconds=${JWT_EXPIRATION_SECONDS:43200}
