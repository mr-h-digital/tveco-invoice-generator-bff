spring.application.name=tveco-invoice-generator-bff

# ── Database ─────────────────────────────────────────────────────────────────
# On Railway, DATABASE_URL is set automatically for PostgreSQL services.
# Format: postgresql://user:pass@host:port/dbname
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/tveco}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Jackson ──────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── CORS ─────────────────────────────────────────────────────────────────────
# Override with your deployed front-end URL in Railway env vars
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
