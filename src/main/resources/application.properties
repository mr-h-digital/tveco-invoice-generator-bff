spring.application.name=tveco-invoice-generator-bff

# ── Database ─────────────────────────────────────────────────────────────────
# Railway may inject URL-style database vars and/or individual PG* vars.
# The application prefers URL-style vars via DataSourceConfig and falls back to PG* values locally.
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:tveco}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Jackson ──────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── CORS ─────────────────────────────────────────────────────────────────────
# Override with your deployed front-end URL(s) in Railway env vars
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://tveco.co.za,https://www.tveco.co.za,https://app.tveco.co.za,https://mr-h-digital.github.io,http://localhost:5173,http://localhost:4173}

# ── Notifications ────────────────────────────────────────────────────────────
# Provider options: webhook | brevo
app.notification.delivery.provider=${NOTIFICATION_DELIVERY_PROVIDER:webhook}
app.notification.webhook-url=${NOTIFICATION_WEBHOOK_URL:}
app.notification.webhook-secret=${NOTIFICATION_WEBHOOK_SECRET:}
app.notification.dispatch.enabled=${NOTIFICATION_DISPATCH_ENABLED:true}
app.notification.dispatch.interval-ms=${NOTIFICATION_DISPATCH_INTERVAL_MS:120000}

# Brevo SMTP API settings (used when NOTIFICATION_DELIVERY_PROVIDER=brevo)
app.notification.brevo.api-key=${BREVO_API_KEY:}
app.notification.brevo.base-url=${BREVO_BASE_URL:https://api.brevo.com}
app.notification.brevo.sender-email=${BREVO_SENDER_EMAIL:}
app.notification.brevo.sender-name=${BREVO_SENDER_NAME:TVECO Operations}

# ── Auth Bootstrap + JWT ─────────────────────────────────────────────────────
app.auth.bootstrap-admin-enabled=${BOOTSTRAP_ADMIN_ENABLED:true}
app.auth.admin-email=${ADMIN_EMAIL:admin@tveco.co.za}
app.auth.admin-password=${ADMIN_PASSWORD:tveco2026}
app.auth.admin-role=${ADMIN_ROLE:admin}
app.auth.jwt-secret=${JWT_SECRET:change-this-jwt-secret-to-at-least-32-bytes-long}
app.auth.jwt-expiration-seconds=${JWT_EXPIRATION_SECONDS:43200}
app.auth.jwt-refresh-expiration-seconds=${JWT_REFRESH_EXPIRATION_SECONDS:1209600}
app.auth.refresh-cookie-name=${REFRESH_COOKIE_NAME:TVECO_REFRESH_TOKEN}
app.auth.refresh-cookie-path=${REFRESH_COOKIE_PATH:/api/auth}
app.auth.refresh-cookie-same-site=${REFRESH_COOKIE_SAME_SITE:Lax}
app.auth.refresh-cookie-secure=${REFRESH_COOKIE_SECURE:true}
app.auth.rate-limit.login.max-attempts=${AUTH_RATE_LIMIT_LOGIN_MAX_ATTEMPTS:12}
app.auth.rate-limit.login.window-seconds=${AUTH_RATE_LIMIT_LOGIN_WINDOW_SECONDS:300}
app.auth.rate-limit.signup.max-attempts=${AUTH_RATE_LIMIT_SIGNUP_MAX_ATTEMPTS:6}
app.auth.rate-limit.signup.window-seconds=${AUTH_RATE_LIMIT_SIGNUP_WINDOW_SECONDS:900}
app.auth.password-reset-base-url=${PASSWORD_RESET_BASE_URL:https://tveco.co.za/client-zone/#/reset-password}

# ── Recovery Messaging (Email, SMS, WhatsApp) ────────────────────────────────
# Provider can be: email (default) | meta-whatsapp | twilio | aws-sns | vonage
app.recovery.messaging.provider=${RECOVERY_MESSAGING_PROVIDER:email}

# Meta WhatsApp Cloud API credentials
# Get these from: https://developers.facebook.com/ -> Business Account -> WhatsApp -> Settings
app.recovery.messaging.meta.api-token=${META_WHATSAPP_API_TOKEN:}
app.recovery.messaging.meta.phone-number-id=${META_WHATSAPP_PHONE_NUMBER_ID:}
app.recovery.messaging.meta.api-base-url=${META_WHATSAPP_API_BASE_URL:https://graph.instagram.com/v18.0}
