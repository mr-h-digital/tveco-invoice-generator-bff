spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.defer-datasource-initialization=true

# Keep optional config keys available in test profile.
app.cors.allowed-origins=http://localhost:5173
app.notification.webhook-url=
app.notification.webhook-secret=
app.auth.jwt-secret=test-jwt-secret-for-suite-at-least-32b
app.auth.jwt-expiration-seconds=43200
app.auth.jwt-refresh-expiration-seconds=1209600
app.auth.refresh-cookie-name=TVECO_REFRESH_TOKEN
app.auth.refresh-cookie-path=/api/auth
app.auth.refresh-cookie-same-site=Lax
app.auth.refresh-cookie-secure=false
